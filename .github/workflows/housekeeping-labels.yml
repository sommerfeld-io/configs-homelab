---
name: 'Housekeeping: Labels'

on:
  schedule:
    - cron: '0 1 * * *'
  push:
    branches:
      - main
    paths:
      - .github/workflows/housekeeping-labels.yml

jobs:
  metrics-start-time:
    runs-on: ubuntu-latest
    outputs:
      start: ${{ steps.record-start.outputs.start }}
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start time
        id: record-start
        uses: ./.github/actions/record-workflow-start-time

  housekeeping-labels:
    uses: sommerfeld-io/.github/.github/workflows/housekeeping-labels.yml@main
    needs: [metrics-start-time]
    permissions:
      contents: read
      issues: write
      pull-requests: write

  metrics-to-grafana-cloud:
    runs-on: ubuntu-latest
    needs: [metrics-start-time, housekeeping-labels]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Push workflow metrics to Grafana Cloud
        uses: ./.github/actions/push-workflow-metrics
        with:
          job_results: >-
            {
              "housekeeping-labels": "${{ needs.housekeeping-labels.result }}"
            }
          start_time: ${{ needs.metrics-start-time.outputs.start }}
          metrics_user: ${{ secrets.GRAFANA_CLOUD_USER }}
          metrics_token: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          metrics_url: ${{ secrets.GRAFANA_CLOUD_URL }}

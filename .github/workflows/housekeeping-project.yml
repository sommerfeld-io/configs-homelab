---
name: 'Housekeeping: Issues + Project'

on:
  issues:
    types:
      - labeled

jobs:
  move-to-ready:
    name: Move issue to 'Ready for Development'
    runs-on: ubuntu-latest
    if: github.event.label.name == 'refinement-done'
    permissions:
      contents: read
      issues: read
      repository-projects: write
    steps:
      - name: Move issue to 'Ready for Development'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN_REPO_AND_PROJECT }}
          ISSUE_NODE_ID: ${{ github.event.issue.node_id }}
        run: |
          # Resolve the project node ID for sommerfeld-io project #1
          PROJECT_ID=$(gh api graphql \
            -f query="query { organization(login: \"sommerfeld-io\") { projectV2(number: 1) { id } } }" \
            --jq '.data.organization.projectV2.id')

          echo "Project ID: $PROJECT_ID"

          # Resolve the Status field ID and the 'Ready for Development' option ID
          FIELD_INFO=$(gh api graphql \
            -f query="query(\$projectId: ID!) {
              node(id: \$projectId) {
                ... on ProjectV2 {
                  fields(first: 20) {
                    nodes {
                      ... on ProjectV2SingleSelectField {
                        id
                        name
                        options { id name }
                      }
                    }
                  }
                }
              }
            }" \
            -f projectId="$PROJECT_ID")

          FIELD_ID=$(echo "$FIELD_INFO" | jq -r '
            .data.node.fields.nodes[]
            | select(.name == "Status")
            | .id')

          OPTION_ID=$(echo "$FIELD_INFO" | jq -r '
            .data.node.fields.nodes[]
            | select(.name == "Status")
            | .options[]
            | select(.name == "Ready for Development")
            | .id')

          echo "Field ID: $FIELD_ID"
          echo "Option ID: $OPTION_ID"

          # Resolve the project item ID for this issue
          ITEM_ID=$(gh api graphql \
            -f query="query(\$projectId: ID!) {
              node(id: \$projectId) {
                ... on ProjectV2 {
                  items(first: 100) {
                    nodes {
                      id
                      content { ... on Issue { id } }
                    }
                  }
                }
              }
            }" \
            -f projectId="$PROJECT_ID" \
            --jq --arg issueId "$ISSUE_NODE_ID" \
            ".data.node.items.nodes[] | select(.content.id == \$issueId) | .id")

          if [[ -z "$ITEM_ID" ]]; then
            echo "Issue is not yet on the project board — skipping"
            exit 0
          fi

          echo "Item ID: $ITEM_ID"

          # Move the issue to 'Ready for Development'
          gh api graphql \
            -f query="mutation(\$projectId: ID!, \$itemId: ID!, \$fieldId: ID!, \$optionId: String!) {
              updateProjectV2ItemFieldValue(input: {
                projectId: \$projectId
                itemId: \$itemId
                fieldId: \$fieldId
                value: { singleSelectOptionId: \$optionId }
              }) {
                projectV2Item { id }
              }
            }" \
            -f projectId="$PROJECT_ID" \
            -f itemId="$ITEM_ID" \
            -f fieldId="$FIELD_ID" \
            -f optionId="$OPTION_ID"

          echo "Issue successfully moved to 'Ready for Development'"
        shell: bash

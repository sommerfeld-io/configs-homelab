---
name: "Pipeline: Release"

on:
  release:
    types: [created]

env:
  DOCS_PAGES_ARTIFACT: docs-page

jobs:
  metrics-start-time:
    runs-on: ubuntu-latest
    outputs:
      start: ${{ steps.record-start.outputs.start }}
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start time
        id: record-start
        uses: ./.github/actions/record-workflow-start-time

  update-release-notes:
    uses: sommerfeld-io/.github/.github/workflows/release.yml@main
    needs: [metrics-start-time]
    permissions:
      contents: write

  docs-build:
    runs-on: ubuntu-latest
    needs: [metrics-start-time]
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
          ref: ${{github.ref}}
      - name: Build docs page
        run: docker compose up docs-build
        shell: bash
      - name: List contents
        run: ls -alF target/docs/site
        shell: bash
      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v5.0.0
        with:
          name: ${{ env.DOCS_PAGES_ARTIFACT }}
          path: target/docs/site

  docs-deploy:
    runs-on: ubuntu-latest
    needs: docs-build
    permissions:
      contents: read
      pages: write
      id-token: write # to verify the deployment originates from an appropriate source
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Setup Pages
        uses: actions/configure-pages@v6.0.0
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5.0.0
        with:
          artifact_name: ${{ env.DOCS_PAGES_ARTIFACT }}

  metrics-to-grafana-cloud:
    runs-on: ubuntu-latest
    needs: [metrics-start-time, update-release-notes, docs-build, docs-deploy]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Push workflow metrics to Grafana Cloud
        uses: ./.github/actions/push-workflow-metrics
        with:
          job_results: >-
            {
              "update-release-notes": "${{ needs.update-release-notes.result }}",
              "docs-build": "${{ needs.docs-build.result }}",
              "docs-deploy": "${{ needs.docs-deploy.result }}"
            }
          start_time: ${{ needs.metrics-start-time.outputs.start }}
          metrics_user: ${{ secrets.GRAFANA_CLOUD_USER }}
          metrics_token: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          metrics_url: ${{ secrets.GRAFANA_CLOUD_URL }}

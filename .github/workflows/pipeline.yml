---
name: "Pipeline: Commit + Test"

on:
  push:
    branches-ignore:
      - dependabot/**
    paths-ignore:
      - '**.adoc'
      - '**.md'
      - 'docs/**'
      - '.devcontainer/**'
      - '.github/workflows/dev-environment.yml'
      - '.vscode/**'
      - '.gitkeep'
  schedule:
    - cron: '0 1 * * 2'

env:
  REGISTRY: docker.io

jobs:

  metrics-start-time:
    runs-on: ubuntu-latest
    outputs:
      start: ${{ steps.record-start.outputs.start }}
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start time
        id: record-start
        uses: ./.github/actions/record-workflow-start-time

  shellcheck:
    runs-on: ubuntu-latest
    needs: [metrics-start-time]
    permissions:
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          ignore_paths: node_modules target

  lint:
    runs-on: ubuntu-latest
    name: ${{ matrix.linter }}
    needs: [metrics-start-time]
    permissions:
      contents: read
    strategy:
      matrix:
        linter: ['yaml', 'workflows', 'filenames', 'folders', 'markdown-links', 'ansible', 'alloy-config']
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Run lint-${{ matrix.linter }} from docker-compose.yml
        env:
          LINTER: ${{ matrix.linter }}
        run: docker compose up "lint-$LINTER" --exit-code-from "lint-$LINTER"
        shell: bash

  check-inspec-profile:
    runs-on: ubuntu-latest
    name: ${{ matrix.profile }}
    needs: [metrics-start-time]
    permissions:
      contents: read
    env:
      INSPEC_IMAGE: chef/inspec:5.22.76
    strategy:
      matrix:
        profile: ['desktop-baseline', 'raspi-baseline', 'ollama', 'server-baseline']
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.x
      - name: Login to Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.DOCKERHUB_USER }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - name: Validate Inspec profile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PROFILE: ${{ matrix.profile }}
        run: task "inspec:check:$PROFILE"
        shell: bash

  # ----- Build Docs stage ------------------------------------------------------------------------

  generate-docs:
    runs-on: ubuntu-latest
    needs: [
      'lint',
      'shellcheck',
      'check-inspec-profile',
    ]
    if: ${{ github.actor != 'dependabot[bot]' }}
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          submodules: true
          ref: ${{github.ref}}
      - name: Install Task
        uses: arduino/setup-task@v2.0.0
        with:
          version: 3.x
      - name: Run task to generate docs
        run: task docs:generate
        shell: bash
      - name: Build docs-build image
        run: docker compose build docs-build
        shell: bash
      - name: Commit and push
        uses: EndBug/add-and-commit@v10.0.0
        with:
          author_name: sebastian
          author_email: sebastian@sommerfeld.io
          message: 'docs: [Actions Bot] generate docs'

  # ----- Release stage ---------------------------------------------------------------------------

  release-code:
    uses: sommerfeld-io/.github/.github/workflows/lib-release-code.yml@main
    needs: [
      'generate-docs',
    ]
    if: ${{ (github.actor != 'dependabot[bot]') && (github.ref == 'refs/heads/main') }}
    secrets:
      GH_TOKEN_REPO_AND_PROJECT: ${{ secrets.GH_TOKEN_REPO_AND_PROJECT }}
    permissions:
      contents: write

  metrics-to-grafana-cloud:
    runs-on: ubuntu-latest
    needs: [metrics-start-time, shellcheck, lint, check-inspec-profile, generate-docs, release-code]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Push workflow metrics to Grafana Cloud
        uses: ./.github/actions/push-workflow-metrics
        with:
          start_time: ${{ needs.metrics-start-time.outputs.start }}
          metrics_user: ${{ secrets.GRAFANA_CLOUD_USER }}
          metrics_token: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          metrics_url: ${{ secrets.GRAFANA_CLOUD_URL }}

---
name: 'Housekeeping: Issues + PRs'

on:
  issues:
    types:
      - opened
  pull_request:
    types:
      - opened
      - assigned

jobs:
  metrics-start-time:
    runs-on: ubuntu-latest
    outputs:
      start: ${{ steps.record-start.outputs.start }}
    steps:
      - uses: actions/checkout@v4
      - name: Record workflow start time
        id: record-start
        uses: ./.github/actions/record-workflow-start-time

  housekeeping-issues:
    uses: sommerfeld-io/.github/.github/workflows/housekeeping-issues.yml@main
    needs: [metrics-start-time]
    secrets:
      GH_TOKEN_REPO_AND_PROJECT: ${{ secrets.GH_TOKEN_REPO_AND_PROJECT }}
    permissions:
      contents: read
      issues: write
      pull-requests: write
      repository-projects: write

  metrics-to-grafana-cloud:
    runs-on: ubuntu-latest
    needs: [metrics-start-time, housekeeping-issues]
    if: always()
    steps:
      - uses: actions/checkout@v4
      - name: Push workflow metrics to Grafana Cloud
        uses: ./.github/actions/push-workflow-metrics
        with:
          start_time: ${{ needs.metrics-start-time.outputs.start }}
          metrics_user: ${{ secrets.GRAFANA_CLOUD_USER }}
          metrics_token: ${{ secrets.GRAFANA_CLOUD_TOKEN }}
          metrics_url: ${{ secrets.GRAFANA_CLOUD_URL }}

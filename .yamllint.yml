---
extends: default

# Helm charts are excluded because they are validated with helm lint
ignore: |
  node_modules
  .vagrant
  target
  tests/inspec/*/vendor
  ansible/roles/ansible-roles-collection

rules:
  line-length:
    max: 1024
    allow-non-breakable-inline-mappings: true
    level: warning
  new-lines:
    type: unix
  braces:
    max-spaces-inside: 1
    level: error
  brackets:
    max-spaces-inside: 1
    level: error
  comments:
    min-spaces-from-content: 1
  comments-indentation: false
  octal-values:
    forbid-implicit-octal: true
    forbid-explicit-octal: true

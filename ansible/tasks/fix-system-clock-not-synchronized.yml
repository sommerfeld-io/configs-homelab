---
- name: Fix  ----  System clock not synchronized  ----  Setup Cron Job
  ansible.builtin.cron:
    name: "chrony system clock watchdog"
    minute: "0"
    hour: "*/2"
    job: "timedatectl show | grep -q 'NTPSynchronized=yes' || (sudo chronyc online && sudo chronyc makestep)"
    user: "{{ default_user }}"

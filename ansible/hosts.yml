---
all:
  vars:
    ansible_user: sebastian
    ansible_python_interpreter: /usr/bin/python3
  children:
    ubuntu_desktop:
      hosts:
        kobol.fritz.box:
        picon.fritz.box:
      vars:
        ps1: '${debian_chroot:+($debian_chroot)}\[\033[1;32m\]\u@\h:\[\033[1;34m\]\w\[\033[00m\]\[\033[0;37m\]$(__git_ps1)\[\033[00m\] $ '
        ps1_root: '${debian_chroot:+($debian_chroot)}\[\033[1;38;5;213m\]\u@\h:\[\033[1;34m\]\w\[\033[00m\] $ '
    ubuntu_server:
      hosts:
        caprica.fritz.box:
      vars:
        ps1: '${debian_chroot:+($debian_chroot)}\[\033[1;38;5;208m\]\u@\h:\[\033[1;34m\]\w\[\033[00m\]\[\033[0;37m\]$(__git_ps1)\[\033[00m\] $ '
        ps1_root: '${debian_chroot:+($debian_chroot)}\[\033[1;38;5;213m\]\u@\h:\[\033[1;34m\]\w\[\033[00m\] $ '
    raspi:
      hosts:
        pi4-01.fritz.box:
        pi4-02.fritz.box:
        pi4-03.fritz.box:
        pi4-05.fritz.box:
        pi5-01.fritz.box:
      vars:
        ps1: '${debian_chroot:+($debian_chroot)}\[\033[1;36m\]\u@\h:\[\033[1;34m\]\w\[\033[00m\]\[\033[0;37m\]$(__git_ps1)\[\033[00m\] $ '
        ps1_root: '${debian_chroot:+($debian_chroot)}\[\033[1;38;5;213m\]\u@\h:\[\033[1;34m\]\w\[\033[00m\] $ '
    ollama:
      hosts:
        picon.fritz.box:
          ollama_models:
            - tinyllama
            - gemma4:e2b
            - gemma4:e4b

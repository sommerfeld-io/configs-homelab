---
- name: Install and configure nodes
  hosts: raspi
  gather_facts: true
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/raspi.yml
    - ../vars/vault.yml
  tasks:
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/hardening
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/bash
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/filesystem
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/packages
        tasks_from: main
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/packages
        tasks_from: raspi
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/packages
        tasks_from: fastfetch
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/taskfile-dev
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/git
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/docker
        tasks_from: main
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/cron
        tasks_from: main

- name: Install and configure nodes (non-root)
  hosts: raspi
  gather_facts: true
  become: false
  vars_files:
    - ../vars/main.yml
    - ../vars/raspi.yml
    - ../vars/vault.yml
  tasks:
    - ansible.builtin.include_role:
        name: ../roles/ansible-roles-collection/atuin

- name: Install and configure runner-04-pi specifics
  hosts: runner-04-pi.fritz.box
  gather_facts: true
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/raspi.yml
  tasks:
    - ansible.builtin.include_role:
        name: ../roles/common/mount-disk
      vars:
        mount_disk_uuid: "c9a69508-2ed1-4d74-9494-72da540a1421" # run `sudo blkid` to get ID
        mount_disk_path: "/mnt/data"

- name: Install and configure runner-04-pi specifics
  hosts: runner-05-pi.fritz.box
  gather_facts: true
  become: true
  vars_files:
    - ../vars/main.yml
    - ../vars/raspi.yml
  tasks:
    - ansible.builtin.include_role:
        name: ../roles/common/mount-disk
      vars:
        mount_disk_uuid: "68a36c9f-9a1b-40e9-9bf4-fd2b6b6eeeef" # run `sudo blkid` to get ID
        mount_disk_path: "/mnt/data"

---
- name: Grafana Cloud  ----  Dashboards  ----  Create from Grafana.com by ID
  community.grafana.grafana_dashboard: # CAUTION: this is community.grafana, not grafana.grafana
    grafana_url: "{{ grafana_com_url }}"
    grafana_api_key: "{{ grafana_com_api_key }}"
    parent_folder: "{{ item.parent_folder }}"
    folder: "{{ item.folder }}"
    dashboard_id: "{{ item.dashboard_id }}"
    dashboard_revision: "{{ item.dashboard_revision }}"
    state: present
  loop:
    - { dashboard_id: "1860", dashboard_revision: "42", parent_folder: "", folder: "sommerfeldio-node" } # https://grafana.com/grafana/dashboards/1860-node-exporter-full

- name: Grafana Cloud  ----  Dashboards  ----   Create from JSON file (hosted on GitHub)
  community.grafana.grafana_dashboard:
    grafana_url: "{{ grafana_com_url }}"
    grafana_api_key: "{{ grafana_com_api_key }}"
    parent_folder: "{{ item.parent_folder }}"
    folder: "{{ item.folder }}"
    dashboard_url: "{{ item.base_url }}/{{ item.file }}"
    state: present
  vars:
    dashboards_branch: main
    dashboards_base_url: https://raw.githubusercontent.com/sommerfeld-io/configs-homelab/refs/heads/{{ dashboards_branch }}/ansible/roles/grafana-cloud/dashboards/files
  loop:
    - { base_url: "{{ dashboards_base_url }}", file: "ollama-summary-by-node.json", parent_folder: "", folder: "sommerfeldio-ai" }

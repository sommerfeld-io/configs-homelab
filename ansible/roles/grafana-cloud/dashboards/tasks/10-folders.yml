- name: Grafana Cloud  ----  Folders  ----  Create
  grafana.grafana.folder:
    grafana_url: "{{ grafana_com_url }}"
    grafana_api_key: "{{ grafana_com_api_key }}"
    title: "{{ item.title }}"
    uid: "{{ item.uid }}"
    state: present
  loop:
    - { title: "Sommerfeld.io", uid: "sommerfeldio" }
    - { title: "Sommerfeld.io - DevOps", uid: "sommerfeldio-devops" }
    - { title: "Sommerfeld.io - Linux Node", uid: "sommerfeldio-node" }
    - { title: "Sommerfeld.io - Playground", uid: "sommerfeldio-playground" }
    - { title: "Sommerfeld.io - Services", uid: "sommerfeldio-services" }
    - { title: "Sommerfeld.io - AI", uid: "sommerfeldio-ai" }
